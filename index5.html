<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 5 </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* background: linear-gradient(135deg, #74ebd5, #9face6); */
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .form-box {
            width: 100%;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .input-box {
            margin-bottom: 15px;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: #6c63ff;
            box-shadow: 0 0 5px rgba(108, 99, 255, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #574fd6;
        }

        .toggle-text {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .toggle-text span {
            color: #6c63ff;
            cursor: pointer;
            font-weight: bold;
        }

        .form {
            display: none;
            animation: fade 0.5s ease;
        }

        .form.active {
            display: block;
        }

        .error {
            color: red;
            font-size: 12px;
            margin-top: 5px;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
        }

        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        
        }
    </style>


<body>
    <video autoplay muted loop id="bgVideo">
        <source src="vecteezy_slomotion-hyperspace-jump-through-the-blue-stars-field_4453627.mp4" type="video/mp4">
    </video>

    <div class="container">

        <!-- Login Form -->
        <div class="form active" id="loginForm">
            <h2>Login</h2>
            <div class="input-box">
                <input type="text" id="loginEmail" placeholder="Email or Username">
                <div class="error" id="loginEmailError"></div>
            </div>
            <div class="input-box">
                <input type="password" id="loginPassword" placeholder="Password">
                <div class="error" id="loginPasswordError"></div>
            </div>
            <button onclick="login()">Login</button>
            <div class="toggle-text">
                Don't have an account? <span onclick="showRegister()">Register</span>
            </div>
        </div>

        <!-- Registration Form -->
        <div class="form" id="registerForm">
            <h2>Register</h2>
            <div class="input-box">
                <input type="text" id="regName" placeholder="Full Name">
                <div class="error" id="regNameError"></div>
            </div>
            <div class="input-box">
                <input type="email" id="regEmail" placeholder="Email">
                <div class="error" id="regEmailError"></div>
            </div>
            <div class="input-box">
                <input type="password" id="regPassword" placeholder="Password">
                <div class="error" id="regPasswordError"></div>
            </div>
            <div class="input-box">
                <input type="password" id="regConfirmPassword" placeholder="Confirm Password">
                <div class="error" id="regConfirmPasswordError"></div>
            </div>
            <button onclick="register()">Register</button>
            <div class="toggle-text">
                Already have an account? <span onclick="showLogin()">Login</span>
            </div>
        </div>

    </div>

    <script>
        function showRegister() {
            document.getElementById("loginForm").classList.remove("active");
            document.getElementById("registerForm").classList.add("active");
        }

        function showLogin() {
            document.getElementById("registerForm").classList.remove("active");
            document.getElementById("loginForm").classList.add("active");
        }

        function login() {
            let email = document.getElementById("loginEmail").value.trim();
            let password = document.getElementById("loginPassword").value.trim();

            document.getElementById("loginEmailError").innerText = "";
            document.getElementById("loginPasswordError").innerText = "";

            let valid = true;

            if (email === "") {
                document.getElementById("loginEmailError").innerText = "Email is required";
                valid = false;
            }

            if (password === "") {
                document.getElementById("loginPasswordError").innerText = "Password is required";
                valid = false;
            }

            if (valid) {
                alert("Login Successful!");
            }
        }

        function register() {
            let name = document.getElementById("regName").value.trim();
            let email = document.getElementById("regEmail").value.trim();
            let password = document.getElementById("regPassword").value.trim();
            let confirmPassword = document.getElementById("regConfirmPassword").value.trim();

            document.getElementById("regNameError").innerText = "";
            document.getElementById("regEmailError").innerText = "";
            document.getElementById("regPasswordError").innerText = "";
            document.getElementById("regConfirmPasswordError").innerText = "";

            let valid = true;

            if (name === "") {
                document.getElementById("regNameError").innerText = "Name is required";
                valid = false;
            }

            if (email === "") {
                document.getElementById("regEmailError").innerText = "Email is required";
                valid = false;
            }

            if (password.length < 6) {
                document.getElementById("regPasswordError").innerText = "Password must be at least 6 characters";
                valid = false;
            }

            if (password !== confirmPassword) {
                document.getElementById("regConfirmPasswordError").innerText = "Passwords do not match";
                valid = false;
            }

            if (valid) {
                alert("Registration Successful!");
                showLogin();
            }
        }
    </script>
</body>

</html>
